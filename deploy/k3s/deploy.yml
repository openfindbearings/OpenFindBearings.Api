apiVersion: apps/v1
kind: Deployment
metadata:
  name: openfindbearings-api-deployment
  namespace: openfindbearings
  labels:
    app: openfindbearings-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openfindbearings-api
  template:
    metadata:
      labels:
        app: openfindbearings-api
    spec:
      containers:
      - name: openfindbearings-api
        image: ghcr.io/openfindbearings/openfindbearings-api:v1.0.0
        ports:
        - containerPort: 80

        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ASPNETCORE_URLS
          value: "http://+:80"
        - name: POD_NETWORK_CIDR
          value: "10.42.0.0/16"  # 根据实际集群配置
        - name: SERVICE_NETWORK_CIDR
          value: "10.43.0.0/16"
        envFrom:
        - secretRef:
            name: openfindbearings-api-secrets
        - configMapRef:
            name: openfindbearings-api-config
        
        livenessProbe:
          httpGet:
            path: /live
            port: 80
          initialDelaySeconds: 30  # 容器启动后延迟30秒开始探测
          periodSeconds: 10        # 每10秒探测一次
          timeoutSeconds: 5        # 探测超时时间
          failureThreshold: 3      # 连续失败3次后重启容器
        
        readinessProbe:
          httpGet:
            path: /ready
            port: 80
          initialDelaySeconds: 5   # 启动后5秒开始探测
          periodSeconds: 5         # 每5秒探测一次
          timeoutSeconds: 3
          successThreshold: 1      # 成功1次即认为就绪
          failureThreshold: 3   

---
apiVersion: v1
kind: Service
metadata:  
  name: openfindbearings-api-service
  namespace: openfindbearings
spec:
  selector:
    app: openfindbearings-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openfindbearings-api-ingress
  namespace: openfindbearings
  labels:
    name: openfindbearings-api-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    acme.cert-manager.io/http01-edit-in-place: "true" 
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
      - api.515813.xyz
    secretName: api-515813-xyz-tls

  rules:
  - host: "api.515813.xyz"
    http:
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: openfindbearings-api-service
              port:
                number: 80
