name: publish-deploy

permissions:
  contents: read
  packages: write

on:
  # 1. 发布 GitHub Release 时触发
  release:
    types: [published]

  # 2. 手动触发（可自定义 tag）
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (e.g., v1.2.3, staging, dev-20260104)'
        required: true
        default: 'latest'
      reason:
        description: 'Reason for manual publish'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      docker_tag: ${{ steps.set_tag.outputs.docker_tag }}
      # 1. 新增输出：动态生成的镜像名
      image_name: ${{ steps.set_image_name.outputs.image_name }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}

      - name: Determine Docker tag
        id: set_tag
        run: |
          case "${{ github.event_name }}" in
            release)
              TAG="${{ github.event.release.tag_name }}"
              ;;
            workflow_dispatch)
              TAG="${{ github.event.inputs.tag }}"
              ;;
            *)
              TAG="latest"
              ;;
          esac
          echo "docker_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Determine Image Name (Lowercase & Replace . with -)
        id: set_image_name
        run: |
         # 1. 获取仓库名
         REPO_NAME="${{ github.event.repository.name }}"
         # 2. 先替换点号 . 为连接符 -
         TEMP_NAME=$(echo "$REPO_NAME" | tr '.' '-')
         # 3. 再将整个字符串转换为小写
         IMAGE_NAME=$(echo "$TEMP_NAME" | tr '[:upper:]' '[:lower:]')
         echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
         echo "Using image name: $IMAGE_NAME"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Build and export image as tar
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: ./src/OpenFindBearings.Api/Dockerfile
          tags: temp-image:${{ steps.set_tag.outputs.docker_tag }}
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: docker-image
          path: /tmp/image.tar

  # --- Push to Docker Hub ---
  push-dockerhub:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7.0.0
        with:
          name: docker-image
          path: /tmp
      - run: docker load < /tmp/image.tar
      - name: Login to Docker Hub
        uses: docker/login-action@v3.6.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push to Docker Hub
        run: |
          TAG=${{ needs.build.outputs.docker_tag }}
          # 2. 使用动态名称
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ needs.build.outputs.image_name }}:$TAG
          docker tag temp-image:$TAG $IMAGE
          docker push $IMAGE

  # --- Push to Quay.io ---
  push-quay:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7.0.0
        with:
          name: docker-image
          path: /tmp
      - run: docker load < /tmp/image.tar
      - name: Login to Quay.io
        uses: docker/login-action@v3.6.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_ROBOT_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}
      - name: Push to Quay.io
        run: |
          TAG=${{ needs.build.outputs.docker_tag }}
          # 2. 使用动态名称
          ORG=$(echo "${{ secrets.QUAY_ROBOT_USERNAME }}" | cut -d'+' -f1)
          IMAGE=quay.io/$ORG/${{ needs.build.outputs.image_name }}:$TAG
          docker tag temp-image:$TAG $IMAGE
          docker push $IMAGE

  # --- Push to GitHub GHCR ---
  push-ghcr:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7.0.0
        with:
          name: docker-image
          path: /tmp
      - run: docker load < /tmp/image.tar
      - name: Login to GHCR
        uses: docker/login-action@v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to GHCR
        run: |
          TAG=${{ needs.build.outputs.docker_tag }}
          # 2. 使用动态名称
          IMAGE=ghcr.io/${{ github.repository_owner }}/${{ needs.build.outputs.image_name }}:$TAG
          docker tag temp-image:$TAG $IMAGE
          docker push $IMAGE

  # --- Deploy to K3s via Remote API ---
  deploy:
    needs: [build, push-ghcr]
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_dispatch' || 
      (github.event_name == 'workflow_dispatch' && inputs.skip_deploy != 'true')
    
    steps:
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          kubectl version --client
      
      - name: Configure kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG_CONTENT }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBECONFIG_CONTENT" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          # 验证连接
          kubectl cluster-info
          kubectl get nodes
      
      - name: Deploy to K3s
        env:
          NAMESPACE: "openfindbearings"
          DEPLOYMENT: "openfindbearings-api-deployment"
          CONTAINER: "openfindbearings-api"
          IMAGE: "ghcr.io/${{ github.repository_owner }}/${{ needs.build.outputs.image_name }}:${{ needs.build.outputs.docker_tag }}"
        run: |
          set -e
          
          echo "========================================="
          echo "开始部署到 K3s"
          echo "部署时间: $(date)"
          echo "========================================="
          echo "命名空间: $NAMESPACE"
          echo "Deployment: $DEPLOYMENT"
          echo "容器名称: $CONTAINER"
          echo "镜像地址: $IMAGE"
          echo "========================================="
          
          # 检查命名空间是否存在
          if ! kubectl get namespace $NAMESPACE &> /dev/null; then
            echo "错误: 命名空间 $NAMESPACE 不存在"
            exit 1
          fi
          
          # 检查 deployment 是否存在
          if ! kubectl get deployment $DEPLOYMENT -n $NAMESPACE &> /dev/null; then
            echo "错误: deployment $DEPLOYMENT 在命名空间 $NAMESPACE 中不存在"
            echo "可用的 deployments:"
            kubectl get deployments -n $NAMESPACE
            exit 1
          fi
          
          # 保存当前镜像以便回滚
          CURRENT_IMAGE=$(kubectl get deployment $DEPLOYMENT \
            -n $NAMESPACE \
            -o jsonpath="{.spec.template.spec.containers[?(@.name==\"$CONTAINER\")].image}")
          
          echo "当前镜像: $CURRENT_IMAGE"
          echo "新镜像: $IMAGE"
          echo ""
          
          # 更新镜像
          echo "正在更新 deployment 镜像..."
          kubectl set image deployment/$DEPLOYMENT \
            $CONTAINER=$IMAGE \
            -n $NAMESPACE \
            --record
          
          # 等待部署完成
          echo "等待 rollout 完成（超时时间: 5分钟）..."
          if ! kubectl rollout status deployment/$DEPLOYMENT \
            -n $NAMESPACE \
            --timeout=5m; then
            echo ""
            echo "❌ 部署失败，正在回滚..."
            kubectl rollout undo deployment/$DEPLOYMENT \
              -n $NAMESPACE
            echo "回滚完成"
            echo "当前镜像已恢复为:"
            kubectl get deployment $DEPLOYMENT \
              -n $NAMESPACE \
              -o jsonpath="{.spec.template.spec.containers[?(@.name==\"$CONTAINER\")].image}"
            echo ""
            exit 1
          fi
          
          # 验证部署
          echo ""
          echo "========================================="
          echo "✅ 部署成功！"
          echo "========================================="
          echo ""
          echo "Deployment 状态:"
          kubectl get deployment $DEPLOYMENT -n $NAMESPACE
          echo ""
          echo "Pods 状态:"
          kubectl get pods -n $NAMESPACE -l app=openfindbearings-api
          echo ""
          echo "最近的 Pods:"
          kubectl get pods -n $NAMESPACE --sort-by='.metadata.creationTimestamp' | tail -5
          echo ""
          echo "最近事件:"
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' | tail -10
          
          echo ""
          echo "部署完成时间: $(date)"
